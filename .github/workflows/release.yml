name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Build wheel and sdist
        run: uv build

      - name: Build zipapp
        run: |
          mkdir -p _zipapp
          cp -r markdraft _zipapp/markdraft
          cp markdraft/__main__.py _zipapp/__main__.py
          python -m zipapp _zipapp -o markdraft.pyz -p "/usr/bin/env python3"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: zipapp
          path: markdraft.pyz

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses Trusted Publisher (OIDC) — no API token needed.
        # Configure at: https://pypi.org/manage/account/publishing/

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: zipapp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            markdraft.pyz
          generate_release_notes: true
